<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煙卷記帳系統</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6a5acd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="煙卷記帳">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        :root { --primary: #6a5acd; --bg: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        #glass-cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 280px; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }
        .login-card button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #888; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .amount-in { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <div id="glass-cover">
        <div class="login-card">
            <h2 id="st-text">系統讀取中...</h2>
            <div id="lf" style="display:none;">
                <p>請輸入密碼</p>
                <input type="password" id="pw-in" placeholder="••••" inputmode="numeric">
                <button onclick="uk()">確認解鎖</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="tab1" class="page active"><h2>🔔 最近到帳</h2><div id="l1"></div></div>
        <div id="tab2" class="page"><h2>📑 歷史明細</h2><div id="l2"></div></div>
        <div id="tab3" class="page"><h2>📈 統計</h2><div class="card" style="text-align:center;"><h3>總盈虧</h3><h1 id="prof">$0</h1></div></div>
        <div id="tab4" class="page">
            <h2>⚙️ 設定</h2>
            <div class="card">
                <button onclick="sp()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:16px;">啟動手機推播</button>
            </div>
            <div class="card" style="text-align: center;"><button onclick="lo()" style="color:#888; border:none; background:none;">登出</button></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="sw(1)"><span>🔔</span><span>到帳</span></div>
        <div class="nav-item" onclick="sw(2)"><span>📑</span><span>明細</span></div>
        <div class="nav-item" onclick="sw(3)"><span>📈</span><span>統計</span></div>
        <div class="nav-item" onclick="sw(4)"><span>⚙️</span><span>設定</span></div>
    </div>

    <script>
        const CONFIG = {
            gasUrl: "https://script.google.com/macros/s/AKfycbx93fplsRz22ohy8wqJEpdzSYkvMrwbgc_ieZwpw_dChuf1lmc1D3USyXiGRZ9AtAOs/exec", // 👈 貼上你 B3 的新網址
            firebase: {
                apiKey: "AIzaSyD2_eAUXKq4N_6bHxwkZ5cKoZv3RCVSY-c",
                authDomain: "yanjuan-accounting.firebaseapp.com",
                projectId: "yanjuan-accounting",
                storageBucket: "yanjuan-accounting.firebasestorage.app",
                messagingSenderId: "757038841020",
                appId: "1:757038841020:web:d66733ee8ddfedb8e9a4b9"
            },
            vapidKey: "BBik7IDFeqp3tcrsWcMlCGrBQ5MX-iYkgSltTOLD9kMSCQb5GQ5if7duoTAIInD4JSQyK8OZZox3LCio115ro4A" // 👈 貼上 Firebase 的「網路推播憑證」那一串
        };

        let data = [], auth = "";

        async function init() {
            try {
                const res = await fetch(CONFIG.gasUrl);
                const json = await res.json();
                data = json.data; auth = String(json.auth).trim();
                document.getElementById('st-text').innerText = "煙卷記帳系統";
                document.getElementById('lf').style.display = "block";
                if(localStorage.getItem('lg') === auth) { document.getElementById('glass-cover').style.display='none'; render(); }
            } catch(e) { alert("連線失敗，請檢查網路或 GAS 網址。"); }
        }

        function uk() {
            const i = document.getElementById('pw-in').value.trim();
            if(i === auth) { localStorage.setItem('lg', auth); document.getElementById('glass-cover').style.display='none'; render(); } else { alert("密碼錯誤"); }
        }

        function render() {
            const inc = data.filter(d => Number(d.金額) > 0).slice(0, 10);
            document.getElementById('l1').innerHTML = inc.map(d => `<div class="card"><div style="display:flex;justify-content:space-between;"><span>${d.項目}</span><span class="amount-in">+$${d.金額}</span></div></div>`).join('');
            document.getElementById('l2').innerHTML = data.map(d => `<div class="card"><div style="display:flex;justify-content:space-between;"><strong>${d.項目}</strong><span>$${d.金額}</span></div></div>`).join('');
            const p = data.reduce((a, c) => a + Number(c.金額 || 0), 0);
            document.getElementById('prof').innerText = "$" + p.toLocaleString();
        }

        function sw(i) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab' + i).classList.add('active');
            document.querySelectorAll('.nav-item')[i-1].classList.add('active');
        }

        // --- iPhone 專用推播啟動器 ---
        async function sp() {
            alert("1/4: 啟動收信員...");
            try {
                // 註冊 Service Worker
                const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                
                alert("2/4: 請求權限...");
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert("權限被拒絕，請到手機設定開放。");
                    return;
                }

                alert("3/4: 連線 Firebase...");
                if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
                const messaging = firebase.messaging();
                
                // 取得 Token
                const token = await messaging.getToken({ vapidKey: CONFIG.vapidKey, serviceWorkerRegistration: reg });
                
                if (token) {
                    alert("4/4: 同步至試算表...");
                    await fetch(CONFIG.gasUrl, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ type: "register_token", token: token })
                    });
                    alert("✅【推播啟動成功】");
                }
            } catch (err) {
                alert("🚨 發生錯誤:\n" + err.message);
            }
        }

        function lo() { localStorage.removeItem('lg'); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
