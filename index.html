<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記帳管理系統</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6a5acd">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        :root {
            --primary-color: #6a5acd;
            --secondary-color: #f4f4f9;
            --text-color: #333;
            --success-color: #28a745;
            --danger-color: #dc3545;
        }

        body {
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 玻璃蓋密碼鎖 */
        #glass-cover {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            box-sizing: border-box;
        }

        .login-card button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 主內容佈局 */
        .container {
            padding: 20px;
            padding-bottom: 80px;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片樣式 */
        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .amount-in { color: var(--success-color); font-weight: bold; }
        .amount-out { color: var(--danger-color); font-weight: bold; }

        /* 底部導覽列 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: white;
            display: flex;
            border-top: 1px solid #eee;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* 統計圖表簡易佔位 */
        .chart-placeholder {
            width: 100%;
            height: 200px;
            background: #f9f9f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

    <div id="glass-cover">
        <div class="login-card">
            <h2 style="margin-top:0;">系統鎖定</h2>
            <p>請輸入管理密碼</p>
            <input type="password" id="password-input" placeholder="••••" inputmode="numeric">
            <button onclick="verifyPassword()">解鎖進入</button>
        </div>
    </div>

    <div class="container">
        <div id="tab1" class="page active">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                🔔 到帳通知
                <button onclick="fetchData()" style="font-size: 12px; padding: 5px;">更新</button>
            </h2>
            <div id="arrival-list">載入中...</div>
        </div>

        <div id="tab2" class="page">
            <h2>📑 匯款明細</h2>
            <input type="text" id="search-input" placeholder="搜尋項目或備註..." onkeyup="filterData()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; box-sizing:border-box;">
            <div id="detail-list">載入中...</div>
        </div>

        <div id="tab3" class="page">
            <h2>📈 數據統計</h2>
            <div class="card" style="text-align: center;">
                <p>本月淨利</p>
                <h1 id="stat-profit">$0</h1>
            </div>
            <div class="card">
                <p>收支分析</p>
                <div class="chart-placeholder">圖表載入中...</div>
            </div>
        </div>

        <div id="tab4" class="page">
            <h2>⚙️ 設置中心</h2>
            <div class="card">
                <h3>推播設定</h3>
                <p style="font-size: 14px; color: #666;">接收 Sheets 更新即時通知</p>
                <button onclick="requestNotificationPermission()" id="push-btn">開啟推播通知</button>
            </div>
            <div class="card">
                <h3>系統資訊</h3>
                <p>GAS 網址狀態: <span id="gas-status">檢查中...</span></p>
                <button onclick="logout()" style="color: var(--danger-color); background: none; border: 1px solid; border-radius: 5px; padding: 5px 10px;">登出系統</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab(1)"><i>🔔</i><span>到帳</span></div>
        <div class="nav-item" onclick="switchTab(2)"><i>📑</i><span>明細</span></div>
        <div class="nav-item" onclick="switchTab(3)"><i>📈</i><span>統計</span></div>
        <div class="nav-item" onclick="switchTab(4)"><i>⚙️</i><span>設置</span></div>
    </div>

    <script>
        // === 1. 基本設定 (請填入你的資訊) ===
        const CONFIG = {
            gasUrl: "YOUR_GAS_WEB_APP_URL", // 貼上你 System_Config B3 的網址
            firebase: {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT.appspot.com",
                messagingSenderId: "YOUR_SENDER_ID",
                appId: "YOUR_APP_ID"
            }
        };

        let allData = [];
        let correctPassword = "";

        // === 2. 初始化與密碼邏輯 ===
        async function init() {
            try {
                const response = await fetch(CONFIG.gasUrl);
                const result = await response.json();
                allData = result.data;
                correctPassword = result.auth;
                document.getElementById('gas-status').innerText = "連線正常";
                
                // 自動登入檢查
                if (localStorage.getItem('isLogged') === correctPassword) {
                    document.getElementById('glass-cover').style.opacity = '0';
                    setTimeout(() => document.getElementById('glass-cover').style.display = 'none', 500);
                    renderData();
                }
            } catch (e) {
                console.error("載入失敗", e);
                document.getElementById('gas-status').innerText = "連線失敗";
            }
        }

        function verifyPassword() {
            const input = document.getElementById('password-input').value;
            if (input === String(correctPassword)) {
                localStorage.setItem('isLogged', input);
                document.getElementById('glass-cover').style.opacity = '0';
                setTimeout(() => document.getElementById('glass-cover').style.display = 'none', 500);
                renderData();
            } else {
                alert("密碼錯誤！");
            }
        }

        function logout() {
            localStorage.removeItem('isLogged');
            location.reload();
        }

        // === 3. 分頁切換 ===
        function switchTab(tabIndex) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab' + tabIndex).classList.add('active');
            document.querySelectorAll('.nav-item')[tabIndex - 1].classList.add('active');
        }

        // === 4. 資料渲染 ===
        function renderData() {
            const arrivalDiv = document.getElementById('arrival-list');
            const detailDiv = document.getElementById('detail-list');
            
            // 處理到帳通知 (僅顯示最近 10 筆收入)
            const arrivals = allData.filter(d => d.金額 > 0).slice(0, 10);
            arrivalDiv.innerHTML = arrivals.map(d => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>${d.項目}</span>
                        <span class="amount-in">+$${d.金額}</span>
                    </div>
                    <div style="font-size:12px; color:#999; margin-top:5px;">${new Date(d.日期).toLocaleString()}</div>
                </div>
            `).join('');

            // 處理全部明細
            detailDiv.innerHTML = allData.map(d => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${d.項目}</strong>
                        <span class="${d.金額 > 0 ? 'amount-in' : 'amount-out'}">${d.金額 > 0 ? '+' : ''}$${d.金額}</span>
                    </div>
                    <div style="font-size:12px; color:#666; margin-top:5px;">類別: ${d.類別} | 備註: ${d.備註 || '無'}</div>
                </div>
            `).join('');

            // 計算統計
            const profit = allData.reduce((acc, cur) => acc + Number(cur.金額), 0);
            document.getElementById('stat-profit').innerText = `$${profit.toLocaleString()}`;
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('#detail-list .card');
            cards.forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
            });
        }

        // === 5. Firebase 推播設定 ===
        function requestNotificationPermission() {
            firebase.initializeApp(CONFIG.firebase);
            const messaging = firebase.messaging();

            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    console.log('通知權限已取得');
                    messaging.getToken({ vapidKey: 'YOUR_VAPID_KEY' }).then((token) => {
                        console.log('Token:', token);
                        document.getElementById('token-display').innerText = token.substring(0, 15) + "...";
                        alert("推播啟動成功！");
                    });
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
